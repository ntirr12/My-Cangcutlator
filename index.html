<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cangcutlator saya</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    font-family: sans-serif;
    color: white;
}

.calculator {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 20px;
    width: 300px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.display {
    height: 60px;
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 10px;
    font-size: 1.4em;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    height: 60px; /* fallback biar stabil di HP */
    border: none;
    border-radius: 12px;
    font-size: 1.1em;
    background: rgba(255,255,255,0.1);
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: rgba(255,255,255,0.3);
}

button:active {
    transform: scale(0.9);
}

/* posisi fix */
.zero {
    grid-column: 1 / 3;
}

.equal {
    grid-column: 3 / 5;
    grid-row: 5;
    background: #00c6ff;
}

.equal:hover {
    background: #0072ff;
}

.display {
    height: 80px;
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    margin-bottom: 15px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
}

.history {
    font-size: 0.8em;
    opacity: 0.6;
    transform: translateY(10px) scale(0.9);
    transition: all 0.3s ease;
    text-align: right;
}

.main {
    font-size: 1.4em;
    text-align: right;
    transition: all 0.3s ease;
}

/* animasi saat hasil */
.animate .history {
    transform: translateY(0) scale(1);
    opacity: 0.7;
}

.animate .main {
    transform: scale(1.1);
}
</style>
</head>

<body>

<div class="calculator">
    <div class="display">
    <div class="history" id="history"></div>
    <div class="main" id="display">0</div>
</div>

    <div class="buttons">
        <button onclick="clearDisplay()">C</button>
        <button onclick="add('/')">÷</button>
        <button onclick="add('*')">×</button>
        <button onclick="add('-')">−</button>

        <button onclick="add('7')">7</button>
        <button onclick="add('8')">8</button>
        <button onclick="add('9')">9</button>
        <button onclick="add('+')">+</button>

        <button onclick="add('4')">4</button>
        <button onclick="add('5')">5</button>
        <button onclick="add('6')">6</button>

        <button onclick="add('1')">1</button>
        <button onclick="add('2')">2</button>
        <button onclick="add('3')">3</button>

        <button class="zero" onclick="add('0')">0</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
let display = document.getElementById("display");
let history = document.getElementById("history");
let container = document.querySelector(".display");

let input = "";

function add(val) {
    input += val;
    display.innerText = input;
}

function clearDisplay() {
    input = "";
    display.innerText = "0";
    history.innerText = "";
}

function calculate() {
    history.innerText = input;

    container.classList.remove("animate");
    void container.offsetWidth; // reset animasi
    container.classList.add("animate");

    display.innerText = "processing...";

    setTimeout(() => {
        display.innerText = "hello world";
        input = "";
    }, 500);
}
</script>

</body>
</html>
